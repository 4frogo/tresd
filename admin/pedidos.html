<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - TresD Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --dark-2: #1e293b; --dark-3: #334155; --text-light: #94a3b8; --white: #fff; --success: #10b981; --warning: #f59e0b; --error: #ef4444; --radius: 10px; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); margin: 0; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--dark-2); border-right: 1px solid var(--dark-3); padding: 20px; position: fixed; height: 100vh; }
        .sidebar-logo { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .sidebar-logo i { color: var(--primary); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: var(--radius); color: var(--text-light); font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 4px; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--dark); color: var(--white); }
        .nav-item .badge { margin-left: auto; background: var(--primary); padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .logout { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--dark-3); }
        .main { flex: 1; margin-left: 240px; padding: 24px; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 28px; }
        .orders-grid { display: grid; gap: 16px; }
        .order-card { background: var(--dark-2); border: 1px solid var(--dark-3); border-radius: var(--radius); padding: 20px; }
        .order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .order-id { font-size: 16px; font-weight: 600; }
        .order-date { font-size: 13px; color: var(--text-light); }
        .order-status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .order-status.pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .order-status.paid { background: rgba(16,185,129,0.15); color: var(--success); }
        .order-status.shipped { background: rgba(99,102,241,0.15); color: var(--primary); }
        .order-status.delivered { background: rgba(16,185,129,0.15); color: var(--success); }
        .order-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .order-section h4 { font-size: 13px; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; }
        .order-section p { font-size: 14px; margin-bottom: 4px; }
        .order-items { border-top: 1px solid var(--dark-3); padding-top: 16px; margin-top: 16px; }
        .order-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--dark-3); }
        .order-item:last-child { border-bottom: none; }
        .order-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; }
        .order-item-info { flex: 1; }
        .order-item-info h4 { font-size: 14px; margin-bottom: 2px; }
        .order-item-info p { font-size: 12px; color: var(--text-light); }
        .order-item-price { font-size: 14px; font-weight: 600; color: var(--primary); }
        .order-total { display: flex; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--dark-3); margin-top: 16px; font-size: 16px; font-weight: 700; }
        .order-actions { display: flex; gap: 8px; margin-top: 16px; }
        .order-actions button { padding: 10px 16px; background: var(--dark); border: 1px solid var(--dark-3); border-radius: 8px; color: var(--white); font-size: 13px; cursor: pointer; }
        .order-actions button:hover { background: var(--primary); }
        .empty { text-align: center; padding: 60px; color: var(--text-light); }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .order-details { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fa-solid fa-cube"></i> TresD</div>
            <nav class="nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="produtos.html" class="nav-item"><i class="fa-solid fa-cube"></i> Produtos</a>
                <a href="pedidos.html" class="nav-item active"><i class="fa-solid fa-shopping-bag"></i> Pedidos <span class="badge">12</span></a>
            </nav>
            <div class="logout">
                <div class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Sair</div>
            </div>
        </aside>
        <main class="main">
            <h1 class="page-title">Gerenciar Pedidos</h1>
            <div class="orders-grid" id="ordersGrid"></div>
        </main>
    </div>
    <script>
        if (!localStorage.getItem('tresd_admin')) window.location.href = 'index.html';
        
        const orders = [
            {id:'#TD847291',date:'26/04/2026',status:'pending',customer:'João Silva',email:'joao@email.com',phone:'(11) 99999-9999',address:'Rua A, 123 - SP',items:[
                {name:'Elefante Decorativo',price:49.90,qty:1,image:'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=100'},
                {name:'Vaso Geométrico',price:39.90,qty:2,image:'https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?w=100'}
            ],total:129.70},
            {id:'#TD847290',date:'25/04/2026',status:'paid',customer:'Maria Santos',email:'maria@email.com',phone:'(21) 88888-8888',address:'Rua B, 456 - RJ',items:[
                {name:'Miniatura D20',price:29.90,qty:3,image:'https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?w=100'}
            ],total:89.70},
            {id:'#TD847289',date:'24/04/2026',status:'shipped',customer:'Pedro Costa',email:'pedro@email.com',phone:'(31) 77777-7777',address:'Rua C, 789 - MG',items:[
                {name:'Organizador Canetas',price:34.90,qty:1,image:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=100'},
                {name:'Suporte Fone',price:24.90,qty:2,image:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=100'}
            ],total:84.70}
        ];
        
        function getStatusLabel(status) {
            const labels = {pending:'Aguardando Pagamento',paid:'Pago',shipped:'Enviado',delivered:'Entregue'};
            return labels[status] || status;
        }
        
        document.getElementById('ordersGrid').innerHTML = orders.length ? orders.map(o => `
            <div class="order-card">
                <div class="order-header">
                    <div>
                        <div class="order-id">${o.id}</div>
                        <div class="order-date">${o.date}</div>
                    </div>
                    <span class="order-status ${o.status}">${getStatusLabel(o.status)}</span>
                </div>
                <div class="order-details">
                    <div class="order-section">
                        <h4>Cliente</h4>
                        <p><strong>${o.customer}</strong></p>
                        <p>${o.email}</p>
                        <p>${o.phone}</p>
                    </div>
                    <div class="order-section">
                        <h4>Entrega</h4>
                        <p>${o.address}</p>
                    </div>
                </div>
                <div class="order-items">
                    <h4>Itens</h4>
                    ${o.items.map(i => `
                        <div class="order-item">
                            <img src="${i.image}" alt="${i.name}">
                            <div class="order-item-info">
                                <h4>${i.name}</h4>
                                <p>Qtd: ${i.qty}</p>
                            </div>
                            <span class="order-item-price">R$ ${(i.price * i.qty).toFixed(2).replace('.',',')}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="order-total">
                    <span>Total</span>
                    <span>R$ ${o.total.toFixed(2).replace('.',',')}</span>
                </div>
                <div class="order-actions">
                    ${o.status === 'pending' ? '<button onclick="updateStatus(\''+o.id+'\',\'paid\')"><i class="fa-solid fa-check"></i> Marcar Pago</button>' : ''}
                    ${o.status === 'paid' ? '<button onclick="updateStatus(\''+o.id+'\',\'shipped\')"><i class="fa-solid fa-truck"></i> Marcar Enviado</button>' : ''}
                    ${o.status === 'shipped' ? '<button onclick="updateStatus(\''+o.id+'\',\'delivered\')"><i class="fa-solid fa-check-double"></i> Marcar Entregue</button>' : ''}
                    <button onclick="printOrder('${o.id}')"><i class="fa-solid fa-print"></i> Imprimir</button>
                </div>
            </div>
        `).join('') : '<div class="empty"><i class="fa-solid fa-shopping-bag" style="font-size:48px; margin-bottom:16px;"></i><p>Nenhum pedido encontrado</p></div>';
        
        function updateStatus(id, status) {
            alert('Status atualizado!');
        }
        
        function printOrder(id) {
            window.print();
        }
        
        function logout() { localStorage.removeItem('tresd_admin'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
