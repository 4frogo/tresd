<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TresD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --dark-2: #1e293b; --dark-3: #334155; --text-light: #94a3b8; --white: #fff; --success: #10b981; --error: #ef4444; --radius: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--dark-2); border: 1px solid var(--dark-3); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 380px; text-align: center; }
        .login-logo { font-size: 32px; font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .login-logo i { color: var(--primary); }
        .login-logo span { background: linear-gradient(135deg, var(--primary), #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-subtitle { color: var(--text-light); font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-light); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; background: var(--dark); border: 1px solid var(--dark-3); border-radius: var(--radius); color: var(--white); font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--primary); outline: none; }
        .error { color: var(--error); font-size: 13px; margin-bottom: 12px; min-height: 18px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #06b6d4); background-size: 200% 200%; animation: gradient 3s ease infinite; color: var(--white); border-radius: var(--radius); font-weight: 600; font-size: 14px; border: none; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        @keyframes gradient { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }
        .back-link { display: inline-block; margin-top: 20px; color: var(--text-light); font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo"><i class="fa-solid fa-cube"></i> <span>TresD</span></div>
        <p class="login-subtitle">Área Administrativa</p>
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="admin@tresd.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="error" id="error"></div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar para a loja</a>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email === 'admin@tresd.com.br' && password === 'tresd123') {
                localStorage.setItem('tresd_admin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').textContent = 'E-mail ou senha incorretos';
            }
        });
    </script>
</body>
</html>
